services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/src:/app/src
    env_file:
      - .env
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
    env_file:
      - .env

  slicer:
    build: ./slicer
    platform: linux/amd64
    volumes:
      - slicer_profiles:/data/profiles
      - slicer_output:/data/output
    environment:
      - PROFILES_DIR=/data/profiles
      - OUTPUT_DIR=/data/output

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  n8n:
    image: n8nio/n8n
    expose:
      - "5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=false
      - N8N_SECURE_COOKIE=false
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_PERSONALIZATION_ENABLED=false
      - N8N_VERSION_NOTIFICATIONS_ENABLED=false
      - N8N_TEMPLATES_ENABLED=false
    volumes:
      - ./n8n/data:/home/node/.n8n
    depends_on:
      - db
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5678"]
      interval: 5s
      timeout: 3s
      retries: 10

  n8n-proxy:
    image: nginx:alpine
    ports:
      - "5679:80"
    volumes:
      - ./n8n/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      n8n:
        condition: service_healthy

volumes:
  postgres_data:
  slicer_profiles:
  slicer_output:
